<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Core Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="card" id="auth-screen">
            <div class="header">
                <p class="subtitle">AEGIS CORE</p>
                <h1>Identify <span class="title-gradient">Yourself</span></h1>
                <p class="description">Enter your credentials to access the Guardian.</p>
            </div>
            <div class="input-area" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="username" placeholder="Username" autocomplete="off" />
                <input type="password" id="password" placeholder="Password" autocomplete="off" />
            </div>
            <div class="button-group" style="margin-top: 10px;">
                <button class="btn btn-primary" onclick="login()">LOGIN &rarr;</button>
                <button class="btn btn-secondary" onclick="register()">REGISTER</button>
            </div>
            <p id="auth-message" style="color: #A855F7; text-align: center; margin-top: 10px; font-size: 0.85rem;"></p>
        </div>

        <div class="card" id="game-screen" style="display: none;">
            <div class="header">
                <p class="subtitle">AEGIS CORE GUARDIAN PRESENTS</p>
                <h1>Aegis <span class="title-gradient">Challenge</span></h1>
                <p class="description">Convince the Guardian. Decode the cosmos.</p>
                <div class="points-display">Points: <span id="points-value">100</span></div>
            </div>

            <div class="chat-container" id="chat-box">
                <div class="message bot">
                    State your purpose, Seeker. Answer my riddle, or remain silent.
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Enter your guess or message..." autocomplete="off" />
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="sendMessage()">SEND MESSAGE &rarr;</button>
                <button class="btn btn-secondary" onclick="getHint()">GET HINT (Cost: 30pts)</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
